name: CI

on:
  push:
    branches: ["main"]
  pull_request:

env:
  NODE_ENV: test
  ENABLE_DEMO_USERS: "true"

jobs:
  build:
    name: Build frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

  unit-tests-frontend:
    name: Frontend unit tests + coverage
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest with coverage (80% threshold)
        run: npm run test:unit:coverage

  unit-tests-backend:
    name: Backend tests + coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run backend tests with coverage (80% threshold)
        run: >
          node --test --experimental-test-coverage
          --test-coverage-lines=80
          --test-coverage-branches=80
          --test-coverage-functions=80
          backend/tests/**/*.test.js

  e2e-tests:
    name: E2E tests (Playwright)
    runs-on: ubuntu-latest
    needs: [unit-tests-frontend, unit-tests-backend]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build frontend
        run: npm run build

      - name: Run Playwright tests
        run: npm run test:ui

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
